[build.env]
passthrough = [
    "RUST_BACKTRACE",
    "RUST_LOG",
    "OPENSSL_STATIC",
    "PYO3_CROSS_PYTHON_VERSION",
]

[target.x86_64-unknown-linux-musl]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-musl:main"
pre-build = [
    "apt-get update && apt-get install -y perl make python3-dev libclang-dev clang"
]

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update && apt-get install -y perl make libclang-dev clang",
    "apt-get install -y python3-dev:arm64 || apt-get install -y python3-dev"
]
